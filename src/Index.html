<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Справочник танцевальных стилей</title>
    <link rel="icon" href="/favicon.ico">
    <analytics></analytics>
</head>
<body>

    <h2 class="Q_h2_d" style="text-align: center;"><span>Справочник <br> танцевальных стилей</span></h2>
    <div><img class="Q_icon_dec" src="./images/Q_icon_dec.svg" alt="иконка декоративная"></div>

    <!-- Карточки стилей -->
    <Section class="C_block_margin">
        <div class="SO_catalog_style">
            <div onclick="window.location.href='frameup.html'" class="O_card_style">
                <div class="M_rating">
                    <p>Темп: средний</p>
                    <div class="A_rating">
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_stroke.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_stroke.svg" alt=""></div>
                    </div>
                </div>

                <div class="M_title_button">
                    <h4 class="boldVF">Фрейм Ап</h4>
                    <button class="A_button_arrow"><img class="Q_arrow_button" src="./images/Arrow_button.svg" alt=""></button>
                </div>

                <div><img class="Q_Image_style" src="./images/style/frameup.webp" alt=""></div>

                <div class="C_tag_card">
                    <p class="grey">Разное</p>
                    <p class="grey">Каблуки</p>
                    <p class="grey">На полу</p>
                </div>

            </div>

            <div class="O_card_style" onclick="window.location.href='afro.html'">
                <div class="M_rating">
                    <p>Темп: быстрый</p>
                    <div class="A_rating">
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_stroke.svg" alt=""></div>
                    </div>
                </div>

                <div class="M_title_button">
                    <h4 class="boldVF">Афро</h4>
                    <button class="A_button_arrow"><img class="Q_arrow_button" src="./images/Arrow_button.svg" alt=""></button>
                </div>

                <div><img class="Q_Image_style" src="./images/style/afro.webp" alt=""></div>

                <div class="C_tag_card">
                    <p class="grey">Эмоции</p>
                    <p class="grey">Все тело</p>
                    <p class="grey">В потоке</p>
                </div>

            </div>

            <div class="O_card_style" onclick="window.location.href='kizomba.html'">
                <div class="M_rating">
                    <p>Темп: медленный</p>
                    <div class="A_rating">
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_stroke.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_stroke.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_stroke.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_stroke.svg" alt=""></div>
                    </div>
                </div>

                <div class="M_title_button">
                    <h4 class="boldVF">Кизомба</h4>
                    <button class="A_button_arrow"><img class="Q_arrow_button" src="./images/Arrow_button.svg" alt=""></button>
                </div>

                <div><img class="Q_Image_style" src="./images/style/kizomba.webp" alt=""></div>

                <div class="C_tag_card">
                    <p class="grey">Чувства</p>
                    <p class="grey">В паре</p>
                    <p class="grey">В потоке</p>
                </div>

            </div>

            <div class="O_card_style" onclick="window.location.href='bachata.html'">
                <div class="M_rating">
                    <p>Темп: ускоренный</p>
                    <div class="A_rating">
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                        <div><img class="Q_ellipse" src="./images/style/Ellipse_field.svg" alt=""></div>
                    </div>
                </div>

                <div class="M_title_button">
                    <h4 class="boldVF">Бачата</h4>
                    <button class="A_button_arrow"><img class="Q_arrow_button" src="./images/Arrow_button.svg" alt=""></button>
                </div>

                <div><img class="Q_Image_style" src="./images/style/bachata.webp" alt=""></div>

                <div class="C_tag_card">
                    <p class="grey">Игривое</p>
                    <p class="grey">В паре</p>
                    <p class="grey">В потоке</p>
                </div>
            </div>

        </div>
    </Section>

    <!-- Меню -->
     <div class="A_menu">
        <div onclick="window.location.href='./index.html'" class="Q_logo"><img src="./images/Logo.svg" alt="логотип"></div>
        <div class="C_menu">
            <p><a href="./index.html">Справочник</a></p>
            <p><a class="grey" href="helper.html">Помощник</a></p>
            <p><a class="grey" href="">Медиа</a></p>
        </div>
    </div>

  
</body>
</html>
